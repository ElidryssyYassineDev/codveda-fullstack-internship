<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Manager</title>

  <script>
    (function () {
      var stored = localStorage.getItem('theme');
      var theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="brand-tag">PM-01</span>
      <h1>Product Manager</h1>
    </div>

    <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="false" aria-label="Toggle dark mode">
      <span class="theme-toggle-track">
        <span class="theme-toggle-text theme-toggle-text--light">LT</span>
        <span class="theme-toggle-text theme-toggle-text--dark">DK</span>
        <span class="theme-toggle-thumb"></span>
      </span>
    </button>
  </header>

  <main class="container">
    <section class="form-section" aria-labelledby="form-heading">
      <p class="form-eyebrow">New entry</p>
      <h2 id="form-heading">Add product</h2>

      <form id="product-form">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required />
        </div>

        <div class="form-group">
          <label for="price">Price ($)</label>
          <input type="number" id="price" name="price" min="0" step="0.01" required />
        </div>

        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" name="description" rows="2"></textarea>
        </div>

        <div class="form-group form-group-checkbox">
          <input type="checkbox" id="inStock" name="inStock" checked />
          <label for="inStock">In stock</label>
        </div>

        <hr class="form-divider" />
        <div class="form-actions">
          <button type="submit" id="submit-btn" class="btn-primary">Add product</button>
          <button type="button" id="cancel-btn" class="btn-cancel" hidden>Cancel</button>
        </div>
        
      </form>
    </section>

    <section class="list-section" aria-labelledby="list-heading">
      <div class="list-header">
        <h2 id="list-heading">Inventory</h2>
        <p id="status-message" class="status-message" role="status"></p>
      </div>

      <div id="product-list" class="product-list">
        <p class="placeholder">Loading products…</p>
      </div>
    </section>
  </main>

  <script type="module" src="js/main.js"></script>
</body>
</html>
